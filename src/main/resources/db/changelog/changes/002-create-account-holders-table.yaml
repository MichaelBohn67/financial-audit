databaseChangeLog:
  - changeSet:
      id: 002-create-account-holders-table
      author: junie
      changes:
        - createTable:
            tableName: account_holders
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_account_holders
              - column:
                  name: first_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: customer_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: birthdate
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: tin
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: company
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: nationality
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
