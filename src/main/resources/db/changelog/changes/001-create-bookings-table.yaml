databaseChangeLog:
  - changeSet:
      id: 001-create-bookings-table
      author: junie
      changes:
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_bookings
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: transaction_timestamp
                  type: DATETIME(6)
                  constraints:
                    nullable: false
              - column:
                  name: source_account
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: destination_account
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
