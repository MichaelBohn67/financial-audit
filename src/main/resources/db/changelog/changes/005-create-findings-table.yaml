databaseChangeLog:
  - changeSet:
      id: 005-create-findings-table
      author: junie
      changes:
        - createTable:
            tableName: findings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_findings
              - column:
                  name: booking_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: rule_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: alert_description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: risk_level
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: auditor_comment
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: findings
            baseColumnNames: booking_id
            referencedTableName: bookings
            referencedColumnNames: id
            constraintName: fk_findings_on_booking
