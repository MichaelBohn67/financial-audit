<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bookings</title>
</head>
<body>
    <h1>Bookings</h1>
    <a th:href="@{/bookings/new}">Add New Booking</a>
    <table>
        <thead>
            <tr>
                <th>Description</th>
                <th>Amount</th>
                <th>Currency</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="booking : ${bookings}">
                <td th:text="${booking.description}">Description</td>
                <td th:text="${booking.amount}">Amount</td>
                <td th:text="${booking.currency}">Currency</td>
                <td>
                    <a th:href="@{/bookings/{id}/edit(id=${booking.id})}">Edit</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
