databaseChangeLog:
  - changeSet:
      id: 003-create-accounts-table
      author: junie
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_accounts
              - column:
                  name: iban
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: currency
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: account_holder_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: accounts
            baseColumnNames: account_holder_id
            referencedTableName: account_holders
            referencedColumnNames: id
            constraintName: fk_accounts_on_account_holder
