<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings View</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<p><a href="index.html">Back to all views</a></p>
<div id="root"></div>
<script src="model-view.js"></script>
<script>
    mountDomainModelView({
        title: "Bookings",
        endpoint: "/api/bookings",
        columns: [
            { key: "id", label: "ID" },
            { key: "description", label: "Description" },
            { key: "amount", label: "Amount" },
            { key: "currency", label: "Currency" },
            { key: "transactionTimestamp", label: "Transaction Timestamp" },
            { key: "sourceAccount", label: "Source Account" },
            { key: "destinationAccount", label: "Destination Account" },
            { key: "createdAt", label: "Created At" }
        ]
    });
</script>
</body>
</html>
